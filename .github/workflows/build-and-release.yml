name: Build & Release Signed APK + AAB
permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > app/upload-keystore.jks

      # === BUILD SIGNED APK ===
      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/upload-keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename signed APK
        run: |
          cd app/build/outputs/apk/release
          SIGNED_FILE="app-release.apk"

          if [[ ! -f "$SIGNED_FILE" ]]; then
            echo "ERROR: Expected signed file $SIGNED_FILE not found!"
            ls -la
            exit 1
          fi

          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            NEW_NAME="TapBlok-${TAG}.apk"
          else
            NEW_NAME="TapBlok-latest.apk"
          fi

          mv "$SIGNED_FILE" "$NEW_NAME"
          echo "Successfully renamed APK to $NEW_NAME"

      - name: Upload signed APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: TapBlok-apk
          path: app/build/outputs/apk/release/TapBlok-*.apk

      # === BUILD SIGNED AAB ===
      - name: Build signed Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/upload-keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename signed AAB
        run: |
          cd app/build/outputs/bundle/release
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            NEW_NAME="TapBlok-${TAG}.aab"
          else
            NEW_NAME="TapBlok-latest.aab"
          fi
          mv app-release.aab "$NEW_NAME" || { echo "AAB rename failed"; exit 1; }
          echo "Successfully renamed AAB to $NEW_NAME"

      - name: Upload signed AAB as artifact
        uses: actions/upload-artifact@v7
        with:
          name: TapBlok-aab
          path: app/build/outputs/bundle/release/TapBlok-*.aab

      # === NATIVE DEBUG SYMBOLS (for Play Console AAB warning: "contains native code, upload debug symbols") ===
      # The app includes native libs via androidx.graphics-path (transitive from Compose/Material).
      # We produce a symbols zip from the build intermediates so it can be uploaded alongside the AAB
      # in Play Console (under the AAB's "..." menu > Upload native debug symbols) to clear the warning
      # and get symbolicated native crashes/ANRs. The zip is also attached directly to the GitHub release.
      # See app/build.gradle.kts for ndk.debugSymbolLevel.
      - name: Create native debug symbols zip
        run: |
          set -e
          SYMBOLS_DIR=$(find app/build/intermediates -type d -path '*merge*NativeLibs*/out/lib' | head -n1 || true)
          if [[ -z "$SYMBOLS_DIR" ]]; then
            # Fallbacks for different AGP layouts
            SYMBOLS_DIR=$(find app/build/intermediates -type d -path '*merged_native_libs*/out/lib' | head -n1 || true)
          fi
          if [[ -z "$SYMBOLS_DIR" || ! -d "$SYMBOLS_DIR" ]]; then
            echo "WARNING: Could not locate native libs dir for symbols. Skipping symbols zip."
            ls -d app/build/intermediates/*native* || true
            exit 0
          fi
          echo "Using native libs from: $SYMBOLS_DIR"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            SYM_NAME="TapBlok-${TAG}-native-debug-symbols.zip"
          else
            SYM_NAME="TapBlok-latest-native-debug-symbols.zip"
          fi
          (cd "$SYMBOLS_DIR" && zip -r "$OLDPWD/app/build/outputs/bundle/release/$SYM_NAME" .)
          echo "Created symbols: app/build/outputs/bundle/release/$SYM_NAME"
          ls -l app/build/outputs/bundle/release/*.zip || true

      - name: Upload native debug symbols as artifact
        uses: actions/upload-artifact@v7
        with:
          name: TapBlok-native-debug-symbols
          path: app/build/outputs/bundle/release/*-native-debug-symbols.zip

      # === CREATE/UPDATE RELEASE WITH RICH NOTES (only on tag push) ===
      - name: Create Release with Release Drafter
        if: startsWith(github.ref, 'refs/tags/')
        id: release_drafter
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
          publish: true
          name: "TapBlok ${{ github.ref_name }} 🚀"
          tag: ${{ github.ref_name }}
          # Don't override version - let release-drafter calculate it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK + AAB + Native Debug Symbols to the Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Wait a moment for the release to be fully created
          sleep 2

          APK_FILE=$(find app/build/outputs/apk/release -name "TapBlok-*.apk" | head -n1)
          AAB_FILE=$(find app/build/outputs/bundle/release -name "TapBlok-*.aab" | head -n1)
          SYM_FILE=$(find app/build/outputs/bundle/release -name "TapBlok-*-native-debug-symbols.zip" | head -n1)

          if [[ -z "$APK_FILE" || -z "$AAB_FILE" ]]; then
            echo "ERROR: APK or AAB not found!"
            exit 1
          fi

          echo "Uploading to release $TAG"
          echo "APK: $APK_FILE"
          echo "AAB: $AAB_FILE"
          if [[ -n "$SYM_FILE" ]]; then
            echo "Native symbols: $SYM_FILE"
          fi

          gh release upload "$TAG" "$APK_FILE" --clobber
          gh release upload "$TAG" "$AAB_FILE" --clobber
          if [[ -n "$SYM_FILE" ]]; then
            gh release upload "$TAG" "$SYM_FILE" --clobber
          fi